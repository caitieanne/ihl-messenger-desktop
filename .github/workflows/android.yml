name: Android

# Build a sideloadable Android APK. Cut alongside a release by pushing a tag
# (v*), or run manually. The APK is a signed release build, installable directly.
# Play Store distribution can come later off the same keystore.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;27.1.12297006"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> "$GITHUB_ENV"

      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Initialise Android project
        run: npx tauri android init --ci

      - name: Apply app icons
        run: npx tauri icon icon-source.png

      - name: Build release APK (optimised, unsigned)
        run: npx tauri android build --apk

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          BT=$(ls -d "$ANDROID_SDK_ROOT"/build-tools/*/ | sort -V | tail -1)
          echo "Using build-tools: $BT"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/ks.jks
          UNSIGNED=$(find src-tauri/gen/android -name "*-release-unsigned.apk" | head -1)
          echo "Unsigned APK: $UNSIGNED"
          mkdir -p dist-apk
          "${BT}zipalign" -f -p 4 "$UNSIGNED" /tmp/aligned.apk
          OUT="dist-apk/IHL.Messenger_${VERSION}_universal.apk"
          "${BT}apksigner" sign \
            --ks /tmp/ks.jks \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --out "$OUT" /tmp/aligned.apk
          "${BT}apksigner" verify --verbose "$OUT"
          rm -f /tmp/ks.jks
          ls -la dist-apk/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ihl-messenger-android
          path: dist-apk/*.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
